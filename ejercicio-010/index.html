<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicio 10 - Generador de patrones</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
			color: #0f172a;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		main {
			max-width: 42rem;
			margin: 3rem auto;
			padding: 2rem;
			background: #ffffff;
			border-radius: 1rem;
			box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.12);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 0.75rem;
		}

		p {
			line-height: 1.5;
		}

		button {
			padding: 0.85rem 1.2rem;
			border: none;
			border-radius: 0.7rem;
			background: #2563eb;
			color: #ffffff;
			font-size: 1rem;
			font-weight: bold;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}

		#resultado {
			margin-top: 1.5rem;
			padding: 1rem;
			border-radius: 0.75rem;
			background: #f8fafc;
			border: 1px solid #cbd5e1;
		}

		.volver {
			display: inline-block;
			margin-top: 1rem;
			padding: 0.7rem 1rem;
			border-radius: 0.7rem;
			background: #e2e8f0;
			color: #1e293b;
			text-decoration: none;
			font-weight: 600;
		}

		.volver:hover {
			background: #cbd5e1;
		}
	</style>
</head>
<body>
	<main>
		<h1>Generador de patrones</h1>
		<p>Pulsa el botón para introducir un número y generar una línea de asteriscos con esa longitud.</p>
		<button id="btn-generar" type="button" onclick="generarPatron()">Generar patrón</button>
		<div id="resultado">Todavía no se ha generado ningún patrón.</div>
		<a class="volver" href="../index.html">Volver al índice</a>
	</main>

	<script>
		// Esta función se ejecuta al pulsar el botón.
		function generarPatron() {
			// Pedimos al usuario un número.
			let respuesta = prompt("Introduce un número para generar el patrón de asteriscos:");

			// Si el usuario pulsa "Cancelar", detenemos la función.
			if (respuesta === null) {
				document.getElementById('resultado').textContent = 'Has cancelado la acción.';
				return;
			}

			// Convertimos el texto introducido a número.
			let numero = Number(respuesta);

			// Si el valor no es un número válido, mostramos un aviso.
			if (isNaN(numero)) {
				document.getElementById("resultado").textContent = "Debes introducir un número válido.";
				return;
			}

			// Aquí iremos construyendo el patrón de asteriscos.
			let patron = "";

			// Repetimos tantas veces como indique el número introducido.
			for (let i = 0; i < numero; i++) {
				patron = patron + "*";
			}

			// Mostramos el patrón en consola, como pide el ejercicio.
			console.log(patron);

			// También lo mostramos dentro de la página.
			document.getElementById("resultado").innerHTML = "Aqui está el patrón generado en base a tu respuesta: " + patron ;
		}
	</script>
</body>
</html>
