<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicio 2 - Validador de correos</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
			color: #0f172a;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		main {
			max-width: 42rem;
			margin: 3rem auto;
			padding: 2rem;
			background: #ffffff;
			border-radius: 1rem;
			box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.12);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 0.75rem;
		}

		p {
			line-height: 1.5;
		}

		button {
			padding: 0.85rem 1.2rem;
			border: none;
			border-radius: 0.7rem;
			background: #2563eb;
			color: #ffffff;
			font-size: 1rem;
			font-weight: bold;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}

		#resultado {
			margin-top: 1.5rem;
			padding: 1rem;
			border-radius: 0.75rem;
			background: #f8fafc;
			border: 1px solid #cbd5e1;
		}

		.volver {
			display: inline-block;
			margin-top: 1rem;
			padding: 0.7rem 1rem;
			border-radius: 0.7rem;
			background: #e2e8f0;
			color: #1e293b;
			text-decoration: none;
			font-weight: 600;
		}

		.volver:hover {
			background: #cbd5e1;
		}
	</style>
</head>
<body>
	<main>
		<h1>Validador de correos</h1>
		<p>Pulsa el botón para escribir un correo y comprobar si contiene el carácter <code>@</code>.</p>
		<button id="btn-validar" type="button" onclick="validar()">Validar correo</button>
		<div id="resultado">Todavía no se ha comprobado ningún correo.</div>
		<a class="volver" href="../index.html">Volver al índice</a>
	</main>

	<script>
		// Esta función se ejecuta cuando el usuario pulsa el botón.
		function validar() {
			// Pedimos al usuario que escriba un correo electrónico.
			let respuesta = prompt("Escribe tu email a continuación");

			// Si el usuario pulsa "Cancelar", prompt devuelve null.
			// Mostramos el mensaje y detenemos la función con return.
			if (respuesta === null) {
				document.getElementById("resultado").innerHTML = "Has cancelado la comprobación del email";
				return;
			}

			// includes("@") comprueba si el texto contiene el carácter @.
			if (respuesta.includes("@")) {
				document.getElementById("resultado").innerHTML = "El correo <strong>es válido.</strong>";
			} else {
				// Si no encuentra @, mostramos que no es válido para este ejercicio.
				document.getElementById("resultado").innerHTML = "El correo <strong>NO es válido.</strong>";
			}
		}
	</script>
</body>
</html>
