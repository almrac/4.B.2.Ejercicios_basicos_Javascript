<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicio 5 - Buscador en Array</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
			color: #0f172a;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		main {
			max-width: 42rem;
			margin: 3rem auto;
			padding: 2rem;
			background: #ffffff;
			border-radius: 1rem;
			box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.12);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 0.75rem;
		}

		p {
			line-height: 1.5;
		}

		button {
			padding: 0.85rem 1.2rem;
			border: none;
			border-radius: 0.7rem;
			background: #2563eb;
			color: #ffffff;
			font-size: 1rem;
			font-weight: bold;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}

		#resultado {
			margin-top: 1.5rem;
			padding: 1rem;
			border-radius: 0.75rem;
			background: #f8fafc;
			border: 1px solid #cbd5e1;
		}

		.volver {
			display: inline-block;
			margin-top: 1rem;
			padding: 0.7rem 1rem;
			border-radius: 0.7rem;
			background: #e2e8f0;
			color: #1e293b;
			text-decoration: none;
			font-weight: 600;
		}

		.volver:hover {
			background: #cbd5e1;
		}
	</style>
</head>
<body>
	<main>
		<h1>Buscador en Array</h1>
		<p>Pulsa el botón para escribir un nombre y comprobar si está dentro de un array con 5 nombres usando un bucle <code>for</code>.</p>
		<button id="btn-buscar" type="button" onclick="buscarNombre()">Buscar nombre</button>
		<div id="resultado">Todavía no se ha realizado ninguna búsqueda.</div>
		<a class="volver" href="../index.html">Volver al índice</a>
	</main>

	<script>
		// Esta función se ejecuta al pulsar el botón.
		function buscarNombre() {
			// Creamos un array con 5 nombres.
			let nombres = ['Ana', 'Luis', 'María', 'Carlos', 'Sofía'];

			// Pedimos al usuario el nombre que quiere buscar.
			let nombreBuscado = prompt('Introduce un nombre para buscar:');

			// Esta variable nos sirve para recordar si hemos encontrado el nombre.
			let encontrado = false;

			// Si el usuario cancela, detenemos la función.
			if (nombreBuscado === null) {
				document.getElementById('resultado').textContent = 'Has cancelado la búsqueda.';
				return;
			}

			// Recorremos el array posición por posición con un bucle for.
			for (let i = 0; i < nombres.length; i++) {
				// Comparamos el nombre actual del array con el nombre escrito por el usuario.
				if (nombres[i] === nombreBuscado) {
					encontrado = true;
					break;
				}
			}

			// Después del bucle, mostramos un mensaje según se haya encontrado o no.
			if (encontrado) {
				document.getElementById('resultado').textContent = `El nombre "${nombreBuscado}" se encuentra en el array.`;
			} else {
				document.getElementById('resultado').textContent = `El nombre "${nombreBuscado}" no se encuentra en el array.`;
			}
		}
	</script>
</body>
</html>
