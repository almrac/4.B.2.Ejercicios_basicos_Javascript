<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ejercicio 6 - Acumulador</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
			color: #0f172a;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		main {
			max-width: 42rem;
			margin: 3rem auto;
			padding: 2rem;
			background: #ffffff;
			border-radius: 1rem;
			box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.12);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 0.75rem;
		}

		p {
			line-height: 1.5;
		}

		button {
			padding: 0.85rem 1.2rem;
			border: none;
			border-radius: 0.7rem;
			background: #2563eb;
			color: #ffffff;
			font-size: 1rem;
			font-weight: bold;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}

		#resultado {
			margin-top: 1.5rem;
			padding: 1rem;
			border-radius: 0.75rem;
			background: #f8fafc;
			border: 1px solid #cbd5e1;
		}

		.volver {
			display: inline-block;
			margin-top: 1rem;
			padding: 0.7rem 1rem;
			border-radius: 0.7rem;
			background: #e2e8f0;
			color: #1e293b;
			text-decoration: none;
			font-weight: 600;
		}

		.volver:hover {
			background: #cbd5e1;
		}
	</style>
</head>
<body>
	<main>
		<h1>Acumulador</h1>
		<p>Pulsa el botón para introducir números. El programa irá sumándolos hasta que escribas <code>0</code>, y al final mostrará la suma total.</p>
		<button id="btn-acumular" type="button" onclick="acumularNumeros()">Empezar suma</button>
		<div id="resultado">Todavía no se ha realizado ninguna suma.</div>
		<a class="volver" href="../index.html">Volver al índice</a>
	</main>

	<script>
		// Esta función se ejecuta al pulsar el botón.
		function acumularNumeros() {
			// Aquí guardaremos la suma total. Empezamos en 0.
			let suma = 0;

			// Pedimos el primer número y lo convertimos a Number para poder sumarlo.
			let respuesta = prompt("Escribe un número. Escribe 0 cuando quieras terminar");

			// Si el usuario cancela, detenemos la función.
			if (respuesta === null) {
				document.getElementById("resultado").innerHTML = "Has cancelado la suma.";
				return;
			}

			let numero = Number(respuesta);

			// Si el valor introducido no es un número válido, mostramos un aviso.
			if (isNaN(numero)) {
				document.getElementById("resultado").innerHTML = "Debes escribir números válidos.";
				return;
			}

			// Repetimos el proceso mientras el número sea distinto de 0.
			while (numero !== 0) {
				// Sumamos el número actual al total acumulado.
				suma = suma + numero;

				// Pedimos el siguiente número.
				respuesta = prompt("Escribe otro número para continuar. Escribe 0 cuando quieras terminar");

				// Si el usuario cancela durante el proceso, detenemos la suma.
				if (respuesta === null) {
					document.getElementById("resultado").innerHTML = "Has cancelado la suma.";
					return;
				}

				numero = Number(respuesta);

				// Si el valor no es válido, detenemos la función para evitar NaN.
				if (isNaN(numero)) {
					document.getElementById("resultado").innerHTML = "Debes escribir números válidos.";
					return;
				}
			}

			// Cuando el usuario escribe 0, salimos del bucle y mostramos el resultado final.
			document.getElementById("resultado").innerHTML = "La suma total es: " + suma;
		}
	</script>
</body>
</html>
